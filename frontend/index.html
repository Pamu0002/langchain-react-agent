<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARIA — Personal AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 760px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-left: 1px solid #e5e5e3;
      border-right: 1px solid #e5e5e3;
    }

    .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #e5e5e3;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 { font-size: 18px; font-weight: 600; color: #1c1c1a; }
    .header p  { font-size: 12px; color: #888; margin-top: 2px; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; display: inline-block; margin-right: 6px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message { display: flex; gap: 10px; max-width: 85%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; flex-shrink: 0;
    }
    .avatar.user-av { background: #e5e5e3; color: #555; }
    .avatar.aria-av { background: #1c1c1a; color: #fff; }

    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.user .bubble { background: #1c1c1a; color: #fff; border-bottom-right-radius: 4px; }
    .message.assistant .bubble { background: #f5f5f4; color: #1c1c1a; border-bottom-left-radius: 4px; }

    .typing { display: flex; gap: 4px; padding: 12px 14px; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%; background: #aaa;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid #e5e5e3;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e5e5e3;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      height: 44px;
      max-height: 140px;
      overflow-y: auto;
      outline: none;
      background: #fafaf9;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #1c1c1a; background: #fff; }

    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid #e5e5e3;
      background: #1c1c1a;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      height: 44px;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .upload-btn {
      background: #fff;
      color: #1c1c1a;
    }

    .file-status {
      font-size: 12px;
      color: #22c55e;
      display: none;
    }
    .file-status.visible { display: block; }

    .clear-btn {
      background: transparent;
      color: #888;
      border: none;
      font-size: 12px;
      padding: 4px 8px;
      height: auto;
    }
    .clear-btn:hover { color: #1c1c1a; opacity: 1; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .session-id {
      font-size: 11px;
      color: #bbb;
      font-family: monospace;
    }

    pre {
      background: #f5f5f4;
      border: 1px solid #e5e5e3;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      overflow-x: auto;
      margin: 6px 0;
    }

    #file-input { display: none; }

    .welcome {
      text-align: center;
      padding: 3rem 1rem;
      color: #888;
    }
    .welcome h2 { font-size: 22px; color: #1c1c1a; margin-bottom: 0.5rem; }
    .welcome p { font-size: 14px; line-height: 1.7; }
    .welcome .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 1.25rem; }
    .chip {
      padding: 6px 14px; background: #f5f5f4;
      border: 1px solid #e5e5e3; border-radius: 20px;
      font-size: 13px; color: #555; cursor: pointer;
      transition: background 0.15s;
    }
    .chip:hover { background: #e5e5e3; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1><span class="status-dot"></span>ARIA</h1>
      <p>Personal AI Assistant — powered by llama-3.3-70b</p>
    </div>
    <button class="clear-btn" onclick="clearChat()">clear chat</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>Hello, I'm ARIA</h2>
      <p>I can answer questions, search the web for current information,<br>and read your uploaded documents.</p>
      <div class="chips">
        <div class="chip" onclick="sendSuggestion(this)">What can you do?</div>
        <div class="chip" onclick="sendSuggestion(this)">Search the web for AI news today</div>
        <div class="chip" onclick="sendSuggestion(this)">What files do I have uploaded?</div>
        <div class="chip" onclick="sendSuggestion(this)">Tell me a fun fact</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="file-status" id="file-status"></div>
    <div class="input-row">
      <input type="file" id="file-input" accept=".pdf,.txt,.docx,.md" onchange="uploadFile(this)" />
      <button class="upload-btn" onclick="document.getElementById('file-input').click()">+ file</button>
      <textarea
        id="msg-input"
        placeholder="Ask ARIA anything..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div class="toolbar">
      <span class="session-id" id="session-display"></span>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
